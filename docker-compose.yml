services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # dev watch (핫리로드). 소스는 마운트, node_modules는 컨테이너 것을 유지.
    command: ['pnpm', 'start:dev']
    environment:
      NODE_ENV: development
      APP_ENV: dev
      APP_PORT: 3000
      # 컨테이너 내부에서는 DB/Redis를 compose 서비스명으로 접속한다(localhost 아님).
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-backend_template}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # 나머지 키는 env.schema의 dev 기본값을 사용(시크릿 하드닝은 prod/stage 전용).
    ports:
      - '${APP_HOST_PORT:-3000}:3000'
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17.6-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-backend_template}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      TZ: ${TZ:-Etc/UTC}
      PGTZ: ${PGTZ:-UTC}
    volumes:
      - ${POSTGRES_DATA_DIR:-./.data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 3s
      timeout: 3s
      retries: 5
    ports:
      - '${POSTGRES_HOST_PORT:-5432}:5432'

  redis:
    image: redis:8.2.1-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - ${REDIS_DATA_DIR:-./.data/redis}:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping | grep PONG']
      interval: 3s
      timeout: 3s
      retries: 5
    ports:
      - '${REDIS_HOST_PORT:-6379}:6379'

  # 선택: DB GUI. `docker compose --profile tools up -d` 로만 기동.
  pgadmin:
    image: dpage/pgadmin4:9.8.0
    profiles: ['tools']
    restart: unless-stopped
    ports:
      - '${PGADMIN_HOST_PORT:-5050}:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
